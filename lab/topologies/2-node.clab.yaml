# Minimal 2-node lab for quick smoke testing
# Usage: sudo containerlab deploy -t lab/topologies/2-node.clab.yaml
name: netmcp-2node
topology:
  nodes:
    leaf1:
      kind: ceos
      image: ceos:latest
      startup-config: ../configs/leaf-base.cfg
      env:
        CEOS_CI: "true"
      ports:
        - "10443:443"  # eAPI HTTPS
    leaf2:
      kind: ceos
      image: ceos:latest
      startup-config: ../configs/leaf-base.cfg
      env:
        CEOS_CI: "true"
      ports:
        - "10444:443"
  links:
    - endpoints: ["leaf1:eth1", "leaf2:eth1"]
