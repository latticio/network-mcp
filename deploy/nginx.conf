# nginx reverse proxy configuration for arista-eos-mcp (Streamable HTTP transport)
#
# Place in /etc/nginx/sites-available/arista-eos-mcp.conf
# Enable with: ln -s /etc/nginx/sites-available/arista-eos-mcp.conf /etc/nginx/sites-enabled/
#
# Key configuration notes:
#   - proxy_buffering MUST be off for MCP Streamable HTTP to work
#   - Extended timeouts prevent disconnects during long-running operations
#   - TLS termination at nginx; backend runs plain HTTP on localhost

upstream mcp_backend {
    server 127.0.0.1:8000;
    # For multiple replicas with sticky sessions, uncomment:
    # ip_hash;
}

server {
    listen 443 ssl http2;
    server_name mcp.network.example.com;

    # --- TLS Configuration ---
    ssl_certificate /etc/letsencrypt/live/mcp.network.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mcp.network.example.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # OCSP Stapling
    ssl_stapling on;
    ssl_stapling_verify on;

    # --- Security Headers ---
    add_header Strict-Transport-Security "max-age=63072000" always;
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;

    # --- Proxy Configuration ---
    location / {
        proxy_pass http://mcp_backend;
        proxy_http_version 1.1;

        # CRITICAL: Disable buffering for Streamable HTTP / SSE
        proxy_buffering off;
        proxy_cache off;

        # Extended timeouts for long-running MCP operations
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_connect_timeout 10s;

        # Forward client information
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Streaming / SSE support
        proxy_set_header Connection "";
        chunked_transfer_encoding on;
    }

    # Trailing slash redirect (MCP clients may need /mcp/)
    location = /mcp {
        return 301 /mcp/;
    }
}

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name mcp.network.example.com;
    return 301 https://$server_name$request_uri;
}
