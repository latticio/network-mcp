! Leaf startup config — eAPI + loopback for BGP + VLANs
hostname leaf
!
username admin privilege 15 role network-admin secret 0 admin
!
management api http-commands
   no shutdown
!
interface Management0
   description oob-mgmt
   no shutdown
!
interface Loopback0
   description router-id
!
vlan 10
   name SERVERS
!
vlan 20
   name STORAGE
!
no aaa root
!
